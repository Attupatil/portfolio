<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Atharva Patil | Software Engineer 2 | Information Security{% endblock %}</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #141418;
            --accent-cyan: #00f2ff;
            --accent-purple: #bc13fe;
            --text-color: #e0e0e0;
            --dim-text: #a0a0a0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
            margin: 0;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: -1;
        }

        .navbar {
            background-color: rgba(10, 10, 12, 0.8) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 242, 255, 0.1);
        }

        .nav-link {
            color: var(--text-color) !important;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--accent-cyan) !important;
        }

        .hero-section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .neon-text {
            color: var(--accent-cyan);
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.3s, border-color 0.3s;
            color: var(--text-color);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-cyan);
        }

        .btn-cyber {
            background: linear-gradient(45deg, var(--accent-purple), var(--accent-cyan));
            border: none;
            color: white;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: opacity 0.3s;
        }

        .btn-cyber:hover {
            opacity: 0.9;
            color: white;
        }

        footer {
            padding: 40px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background-color: var(--card-bg);
            text-align: center;
            color: var(--dim-text);
        }

        .glitch-text {
            position: relative;
            display: inline-block;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-color);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--card-bg);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-cyan);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div id="particles-js"></div>

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand neon-text" href="/">ATHARVA.PATIL</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/about">Experience</a></li>
                    <li class="nav-item"><a class="nav-link" href="/contact">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 Atharva Ashok Patil | Software Engineer 2 @ Dell | Information Security</p>
            <div class="social-links mt-3">
                <a href="https://linkedin.com/in/atharvaashokpatil" target="_blank" class="mx-2 text-decoration-none"><i class="fab fa-linkedin fa-lg"></i></a>
                <a href="https://github.com/attupatil" target="_blank" class="mx-2 text-decoration-none"><i class="fab fa-github fa-lg"></i></a>
                <a href="https://instagram.com/attu_patil" target="_blank" class="mx-2 text-decoration-none"><i class="fab fa-instagram fa-lg"></i></a>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/particles.js/2.0.0/particles.min.js"></script>
    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": ["#00f2ff", "#bc13fe"] },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": true },
                "size": { "value": 4, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00f2ff", "opacity": 0.3, "width": 1 },
                "move": { "enable": true, "speed": 3, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "window",
                "events": { 
                    "onhover": { "enable": true, "mode": "bubble" }, 
                    "onclick": { "enable": true, "mode": "repulse" }, 
                    "resize": true 
                },
                "modes": { 
                    "bubble": { "distance": 200, "size": 6, "duration": 0.3, "opacity": 1, "speed": 3 },
                    "repulse": { "distance": 200, "duration": 0.4 }
                }
            },
            "retina_detect": true
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
